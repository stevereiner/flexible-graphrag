# Flexible GraphRAG - Main Docker Compose

# This is the primary compose file for both running servers and databases in docker for use
# by external flexible-graphrag for development and 
# for deployment of flexible-graphrag along with databases in docker

# IMPORTANT: Before starting, ensure Docker has adequate memory allocated.
# The full stack requires 16GB+ in the Docker VM; with vLLM add ~8GB on top of model VRAM needs.
# See docs/DOCKER-RESOURCE-CONFIGURATION.md for platform-specific setup:
#   Windows:              create C:\Users\<you>\.wslconfig with memory= (see doc for sizing guide)
#   macOS:                Docker Desktop -> Settings -> Resources -> Memory
#   Linux Docker Desktop: Docker Desktop -> Settings -> Resources -> Memory
#   Linux Docker Engine:  native, no VM limits — see doc for cgroup, swap, vm.max_map_count, NVIDIA toolkit

# Docker Compose v2 doesn't require version field

# Include or comment out (if have externally or don't need) services
include:

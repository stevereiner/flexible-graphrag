# ── Theme ──────────────────────────────────────────────────────────────────────

[project.theme]
features = [
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.tracking",
  "navigation.tabs",
  "navigation.indexes",
  "navigation.sections",
  "navigation.expand",
  "navigation.path",
  "navigation.top",
  "search.suggest",
  "search.highlight",
  "content.code.copy",
  "toc.follow",
]

# ── Markdown extensions ────────────────────────────────────────────────────────
# Simple extensions (no config) use empty section headers.
# Extensions with options carry their settings as keys.

# invalid_links disabled: zensical 0.0.40 serve mode gives false positives for
# cross-folder relative links that are valid in the nav (build is clean).
[project.validation]
invalid_links = false

[project.markdown_extensions.admonition]
[project.markdown_extensions."pymdownx.details"]
[project.markdown_extensions."pymdownx.superfences"]
[project.markdown_extensions."pymdownx.inlinehilite"]
[project.markdown_extensions."pymdownx.snippets"]
[project.markdown_extensions.tables]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]

[project.markdown_extensions."pymdownx.highlight"]
anchor_linenums = true

[project.markdown_extensions."pymdownx.tabbed"]
alternate_style = true

[project.markdown_extensions.toc]
permalink = true

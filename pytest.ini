[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -rf
markers =
    bm25: marks tests as BM25 related
    integration: marks integration tests (live backend required)
    unit: marks tests as unit tests
    slow: long wall-clock tests (large ingest, waits, extra LLM rounds) — NOT 'no LLM'
    e2e: marks end-to-end tests (live backend + stores required)
    graph: marks tests that require a running property graph store
    rdf: marks tests that require a running RDF store
    vector: marks tests that require a running vector store
    search_db: marks tests that require a running fulltext search store (ES/OpenSearch/BM25)
    incremental: marks tests that exercise incremental update logic
    ai_qa: tests that call POST /api/query (chat Q&A LLM) — distinct from LLM used during KG ingest
    folder_ingest: marks tests that ingest a folder of multi-format documents (requires INTEGRATION_TEST_DIR)
    datasource: marks tests that exercise a specific data source type (web/wikipedia/youtube/alfresco/cmis/s3/box/etc.)
    lc_pipe: marks LangChain chunker pipeline tests

server {
    listen 4200;
    server_name _;

    root /usr/share/nginx/html;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/wasm image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # Static asset caching (hashed chunk filenames from ng build)
    location ~* /ui/angular/.*\.(js|css|woff2?|ttf|eot|ico|png|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA — serve index.html for all routes under /ui/angular/
    location /ui/angular/ {
        try_files $uri $uri/ /ui/angular/index.html;
    }

    # Health check
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Redirect bare root to the UI
    location = / {
        return 301 /ui/angular/;
    }
}

litellm_settings:
  drop_params: true      # silently drop unsupported params (e.g. parallel_tool_calls for Ollama)

model_list:
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: text-embedding-3-small
    litellm_params:
      model: openai/text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY

  - model_name: ollama/gpt-oss:20b
    litellm_params:
      model: ollama/gpt-oss:20b
      api_base: http://host.docker.internal:11434   # proxy runs in WSL; host.docker.internal reaches Windows Ollama

  - model_name: ollama/llama3.3:70b
    litellm_params:
      model: ollama/llama3.3:70b
      api_base: http://host.docker.internal:11434

  - model_name: ollama/nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://host.docker.internal:11434
